services:
  totalmix-osc-bridge:
    build: .
    ports:
      - "7001:7001"     # OSC
      - "5000:5000"     # HTTP API + UI
    volumes:
      - ./mappings.json:/app/mappings.json
      - ./ufx2_channel_map.json:/app/ufx2_channel_map.json
      - ./backups:/app/backups
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
