<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TotalMix OSC Bridge</title>
    <!-- Tailwind CDN removed for production (see project README for Tailwind CLI / PostCSS setup) -->
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="bg-zinc-950 text-white font-sans">
    <div class="max-w-7xl mx-auto p-6">
        <div class="flex justify-between items-center mb-8 bg-zinc-900 rounded-3xl px-8 py-4 border border-zinc-800">
            <div class="flex items-center gap-8">
                <div id="workspace" class="text-lg font-medium">Workspace: —</div>
                <div id="snapshot" class="text-lg font-medium">Snapshot: —</div>
            </div>
            <div class="flex items-center gap-3">
                <label class="text-sm font-medium text-zinc-400">MIDI Device:</label>
                <select id="midi-device-selector" class="bg-zinc-800 text-white px-4 py-2 rounded-2xl border border-zinc-700 focus:outline-none"></select>
                <button onclick="connectSelectedMIDI()" class="px-6 py-2 bg-emerald-600 hover:bg-emerald-500 rounded-2xl text-sm font-medium">Connect</button>
            </div>
        </div>
        <div id="macro-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </div>
    <script src="app.js"></script>
</body>
</html>
