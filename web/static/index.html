<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TotalMix OSC Bridge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-zinc-950 text-white">
    <div class="max-w-7xl mx-auto p-6">
        <!-- NAV BAR -->
        <div class="flex items-center justify-between mb-8 bg-zinc-900 rounded-3xl px-8 py-4 border border-zinc-700">
            <h1 class="text-2xl font-bold tracking-tight">TotalMix OSC Bridge</h1>

            <div class="flex items-center gap-3">
                <!-- MIDI selector — auto-connects on change -->
                <select id="midi-device-selector" onchange="connectSelectedMIDI()"
                    class="bg-zinc-800 text-white border border-zinc-700 rounded-2xl px-4 py-2 text-sm focus:outline-none focus:border-orange-400 min-w-[160px]">
                </select>

                <!-- MIDI status pill -->
                <div id="midi-status" class="flex items-center gap-2 bg-zinc-800 text-zinc-400 px-4 py-2 rounded-2xl text-sm font-medium whitespace-nowrap border border-zinc-700 transition-all duration-200">
                    <span id="midi-status-dot" class="w-2 h-2 rounded-full bg-zinc-600 transition-all duration-200"></span>
                    <span id="midi-status-text">No MIDI</span>
                </div>

                <!-- Settings gear — uploads + reload -->
                <div class="relative">
                    <button onclick="toggleSettingsMenu()" data-settings-toggle
                        class="w-10 h-10 flex items-center justify-center bg-zinc-800 hover:bg-zinc-700 border border-zinc-700 rounded-2xl text-zinc-400 hover:text-white transition-all active:scale-95"
                        title="Settings">
                        <i class="fas fa-gear"></i>
                    </button>
                    <div id="settings-menu" class="hidden absolute right-0 top-full mt-2 bg-zinc-900 border border-zinc-700 rounded-2xl p-3 flex flex-col gap-1 z-50 min-w-[220px] shadow-xl">
                        <!-- Loaded state summary -->
                        <div class="px-4 py-2 text-[10px] text-zinc-500 border-b border-zinc-800 mb-1">
                            Loaded: <span id="settings-status" class="text-zinc-400">…</span>
                        </div>
                        <div class="px-4 py-1 text-[10px] text-zinc-500 uppercase tracking-widest">MIDI</div>
                        <button onclick="disconnectMIDI(); toggleSettingsMenu()"
                            class="flex items-center gap-3 px-4 py-2 rounded-xl hover:bg-zinc-800 text-sm text-white transition-all text-left">
                            <i class="fas fa-plug-circle-xmark text-red-400 w-4"></i> Disconnect
                        </button>
                        <button onclick="rescanMIDI(); toggleSettingsMenu()"
                            class="flex items-center gap-3 px-4 py-2 rounded-xl hover:bg-zinc-800 text-sm text-white transition-all text-left">
                            <i class="fas fa-arrows-rotate text-blue-400 w-4"></i> Rescan devices
                        </button>
                        <div class="border-t border-zinc-700 my-1"></div>
                        <div class="px-4 py-1 text-[10px] text-zinc-500 uppercase tracking-widest">Config</div>
                        <label class="cursor-pointer flex items-center gap-3 px-4 py-2 rounded-xl hover:bg-zinc-800 text-sm text-white transition-all">
                            <i class="fas fa-upload text-orange-400 w-4"></i> Upload mappings.json
                            <input type="file" accept=".json" class="hidden" onchange="uploadFile(this, 'mappings')">
                        </label>
                        <label class="cursor-pointer flex items-center gap-3 px-4 py-2 rounded-xl hover:bg-zinc-800 text-sm text-white transition-all">
                            <i class="fas fa-upload text-amber-400 w-4"></i> Upload channel map
                            <input type="file" accept=".json" class="hidden" onchange="uploadFile(this, 'channel_map')">
                        </label>
                        <div class="border-t border-zinc-700 my-1"></div>
                        <button onclick="reloadServer(); toggleSettingsMenu()"
                            class="flex items-center gap-3 px-4 py-2 rounded-xl hover:bg-zinc-800 text-sm text-white transition-all text-left">
                            <i class="fas fa-sync text-green-400 w-4"></i> Reload mappings from disk
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div id="macro-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 items-start"></div>
    </div>

    <script src="app.js"></script>
    <script src="ui.js"></script>
    <script src="midi.js"></script>
</body>
</html>
