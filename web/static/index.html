<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TotalMix OSC Bridge</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="top-bar">
        <div class="status">
            <span id="workspace-status">Workspace: —</span>
            <span id="snapshot-status">Snapshot: —</span>
        </div>
        <div class="midi-bar">
            <label>MIDI Device:</label>
            <select id="midi-device"></select>
            <button id="midi-refresh">↻</button>
        </div>
    </div>

    <div class="cards" id="macro-cards"></div>

    <script src="app.js"></script>
</body>
</html>
