# ================================================
# TotalMix OSC Bridge + Web Client v1
# Full example docker-compose service
# Copy & paste the "totalmix-osc-bridge" block into your main docker-compose.yml
# ================================================

version: '3.9'

services:
  totalmix-osc-bridge:
    # === BUILD OPTIONS ===
    build:
      context: https://github.com/auntiepickle/totalmix-osc-bridge.git
      # Pin to specific commit for stability:
      # context: https://github.com/auntiepickle/totalmix-osc-bridge.git#4a712b55c96c6744fe2453f678c85ace03d2a7a6

    container_name: totalmix-osc-bridge
    restart: unless-stopped

    # === ENVIRONMENT (WEB_PORT now lives here — single source of truth) ===
    env_file:
      - /path/to/your/totalmix-osc-bridge/.env     # ← must contain WEB_PORT=

    depends_on:
      - mosquitto

    # === PORTS & NETWORK ===
    ports:
      - "9001:9001/udp"   # RME UFX II OSC control
      - "9003:9003/udp"   # OSC Monitor

    # Web Client v1 now lives at http://YOUR-STUDIO-IP:${WEB_PORT}
    # (8088 by default — change once in .env and you're done)

    # Studio recommended:
    network_mode: host

    # === VOLUMES ===
    volumes:
      - ../totalmix-osc-bridge:/app
      - /mnt/md0/NAS/guest/Scripts/totalmix:/app/config:ro

# ================================================
# Quick Start
# ================================================
# 1. Add WEB_PORT=8088 to your .env
# 2. docker compose up -d
# 3. Open http://YOUR-STUDIO-IP:8088
#
# One change in .env now controls EVERYTHING.