totalmix:
  # ======================
  # INPUT HELPERS
  # ======================
  input_select:
    totalmix_workspace:
      name: "TotalMix Workspace"
      icon: mdi:view-grid
      options:
        - "Loading workspaces..."

    totalmix_snapshot:
      name: "TotalMix Snapshot"
      icon: mdi:bookmark
      options:
        - "Loading snapshots..."

  input_text:
    totalmix_workspace_map:   # only used for workspace slot lookup
      name: "TotalMix Workspace Map"
      mode: text

  input_button:
    refresh_totalmix_workspaces:
      name: "Refresh TotalMix Workspaces"
      icon: mdi:refresh
    refresh_totalmix_snapshots:
      name: "Refresh TotalMix Snapshots"
      icon: mdi:refresh

  # ======================
  # MQTT SENSOR — MINIMAL & RELIABLE
  # ======================
  mqtt:
    sensor:
      - name: "TotalMix Snapshot Map"
        state_topic: "totalmix/snapshot_map"
        value_template: "updated"
        json_attributes_topic: "totalmix/snapshot_map"
        json_attributes_template: "{{ {'snapshot_map': value_json} | tojson }}"

  # ======================
  # AUTOMATIONS
  # ======================
  automation:

    - alias: Update TotalMix Workspace List from Bridge
      description: "Receives list of dicts with real slot indices (sorted by slot)"
      trigger:
        - platform: mqtt
          topic: totalmix/workspaces
      action:
        - variables:
            workspace_list: "{{ trigger.payload_json | default([]) }}"
            clean_options: "{{ workspace_list | map(attribute='name') | list }}"
            workspace_map: >
              {% set ns = namespace(map={}) %}
              {% for item in workspace_list %}
                {% set ns.map = ns.map | combine({item.name: item.index}) %}
              {% endfor %}
              {{ ns.map | to_json }}
        - target:
            entity_id: input_select.totalmix_workspace
          data:
            options: "{{ clean_options }}"
          action: input_select.set_options
        - target:
            entity_id: input_text.totalmix_workspace_map
          data:
            value: "{{ workspace_map }}"
          action: input_text.set_value
      mode: single

    - alias: Load Selected TotalMix Workspace
      description: "Sends real slot index to bridge"
      trigger:
        - platform: state
          entity_id: input_select.totalmix_workspace
      action:
        - variables:
            selected: "{{ trigger.to_state.state }}"
            workspace_map: >
              {% set s = states('input_text.totalmix_workspace_map') %}
              {% if s in ['unknown', '', None] %} {} {% else %} {{ s | from_json }} {% endif %}
            index: "{{ workspace_map.get(selected, 1) }}"
        - data:
            topic: totalmix/workspace
            payload: "{{ index }}"
          action: mqtt.publish
      mode: single

    # SNAPSHOT DROPDOWN — unchanged (already working perfectly)
    - alias: Update Snapshot Dropdown Options
      trigger:
        - platform: state
          entity_id: input_select.totalmix_workspace
        - platform: state
          entity_id: input_button.refresh_totalmix_snapshots
        - platform: state
          entity_id: sensor.totalmix_snapshot_map
      action:
        - variables:
            current_ws: "{{ states('input_select.totalmix_workspace') | default('') }}"
            full_map: "{{ state_attr('sensor.totalmix_snapshot_map', 'snapshot_map') | default({}) }}"
            snapshot_options: >
              {% set d = full_map.get(current_ws, {}).get('snapshots', {}) %}
              {% set ns = namespace(opts=[]) %}
              {% for item in d | dictsort %}
                {% set ns.opts = ns.opts + [item[1]] %}
              {% endfor %}
              {{ ns.opts }}
        - target:
            entity_id: input_select.totalmix_snapshot
          data:
            options: "{{ snapshot_options }}"
          action: input_select.set_options
      mode: single

    - alias: Load Selected TotalMix Snapshot
      trigger:
        - platform: state
          entity_id: input_select.totalmix_snapshot
      action:
        - variables:
            selected_snapshot: "{{ trigger.to_state.state }}"
            full_map: "{{ state_attr('sensor.totalmix_snapshot_map', 'snapshot_map') | default({}) }}"
            current_workspace: "{{ states('input_select.totalmix_workspace') }}"
            snapshot_number: >
              {% set d = full_map.get(current_workspace, {}).get('snapshots', {}) %}
              {% set ns = namespace(num=1) %}
              {% for k, v in d.items() %}
                {% if v == selected_snapshot %}
                  {% set ns.num = k | int %}
                {% endif %}
              {% endfor %}
              {{ ns.num }}
        - data:
            topic: totalmix/snapshot
            payload: "{{ snapshot_number }}"
          action: mqtt.publish
      mode: single